<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Wheel Mobile</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5; margin: 0; overflow: hidden;
        }
        .wheel-container {
            position: relative; width: 320px; height: 320px; margin-top: 50px;
        }
        #wheel {
            width: 100%; height: 100%; border-radius: 50%;
            border: 8px solid #333;
            transition: transform 4s cubic-bezier(0.2, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .pointer {
            position: absolute; top: -15px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #e74c3c;
            z-index: 10; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }
        button {
            margin-top: 40px; padding: 15px 50px; font-size: 20px;
            font-weight: bold; background: #27ae60; color: white;
            border: none; border-radius: 50px;
            box-shadow: 0 5px #1e8449; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px #1e8449; }
    </style>
</head>
<body>

<div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheel" width="500" height="500"></canvas>
</div>
<button id="spinBtn">QUAY NGAY</button>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    
    // 1. CẤU HÌNH PHẦN THƯỞNG
    const prizes = [
        { label: "Voucher 10k", color: "#ff9f43", weight: 40 }, 
        { label: "Thẻ 50k", color: "#0abde3", weight: 10 },
        { label: "500k", color: "#f1c40f", weight: 1 },
        { label: "Voucher 20k", color: "#5f27cd", weight: 19 },
        { label: "Chúc may mắn", color: "#ee5253", weight: 30 }
    ];

    const size = prizes.length;
    const arc = (2 * Math.PI) / size;
    let currentRotation = 0;
    let isSpinning = false;

    // 2. HỆ THỐNG ÂM THANH (Tạo tiếng "tạch" bằng Oscillator)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTickSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    // 3. VẼ VÒNG QUAY
    function drawWheel() {
        prizes.forEach((prize, i) => {
            const angle = i * arc;
            ctx.beginPath();
            ctx.fillStyle = prize.color;
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, angle, angle + arc);
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(angle + arc / 2);
            ctx.fillStyle = "white";
            ctx.textAlign = "right";
            ctx.font = "bold 24px Arial";
            ctx.fillText(prize.label, 230, 10);
            ctx.restore();
        });
    }

    // 4. THEO DÕI VỊ TRÍ ĐỂ PHÁT ÂM THANH
    let lastTickAngle = 0;
    function checkTick(timestamp) {
        if (!isSpinning) return;

        // Lấy góc quay hiện tại từ computed style để chính xác theo animation
        const style = window.getComputedStyle(canvas);
        const matrix = new DOMMatrix(style.transform);
        const angle = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
        const positiveAngle = (angle + 360) % 360;

        const degreesPerSlice = 360 / size;
        // Nếu góc quay vừa lướt qua một mốc của ô mới
        if (Math.floor(positiveAngle / degreesPerSlice) !== Math.floor(lastTickAngle / degreesPerSlice)) {
            playTickSound();
        }
        lastTickAngle = positiveAngle;
        requestAnimationFrame(checkTick);
    }

    // 5. LOGIC QUAY
    function spin() {
        if (isSpinning) return;
        if (audioCtx.state === 'suspended') audioCtx.resume(); // Kích hoạt âm thanh trên iPhone

        isSpinning = true;
        const totalWeight = prizes.reduce((acc, p) => acc + p.weight, 0);
        let random = Math.random() * totalWeight;
        let winningIndex = 0;
        for (let i = 0; i < prizes.length; i++) {
            if (random < prizes[i].weight) { winningIndex = i; break; }
            random -= prizes[i].weight;
        }
        
        const degreesPerSlice = 360 / size;
        const extraSpins = 1800; 
        const stopAngle = (360 - (winningIndex * degreesPerSlice)) - (degreesPerSlice / 2) - 90;
        
        currentRotation += extraSpins + (stopAngle - (currentRotation % 360) + 360) % 360;
        
        canvas.style.transform = `rotate(${currentRotation}deg)`;
        requestAnimationFrame(checkTick);

        setTimeout(() => {
            isSpinning = false;
            alert("Chúc mừng! Bạn nhận được: " + prizes[winningIndex].label);
        }, 4000);
    }

    drawWheel();
    spinBtn.addEventListener('click', spin);
</script>

</body>
</html>
